<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Checkout | CellphonesAndRepair</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/style.css"><script src="./js/tailwind-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/supabase-config.js"></script>
<script src="./js/navbar-component.js"></script>
</head>
<body class="bg-background text-on-background selection:bg-primary-container selection:text-on-primary-container">
    <!-- Modern Unified Navigation Component -->
    <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-[#0a0a0a]/80 backdrop-blur-xl border-b border-slate-200/50 h-[64px]"></header>

<main class="pt-32 pb-20 px-6 max-w-7xl mx-auto min-h-screen">
<div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
<!-- Left Column: Shipping & Payment -->
<div class="lg:col-span-7 space-y-12">
<!-- Shipping Section -->
<section>
<h2 class="text-headline-md font-semibold mb-6 flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="local_shipping">local_shipping</span>
                        Shipping Information
                    </h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="md:col-span-2">
<label class="block text-label-md font-medium text-on-surface-variant mb-1.5 px-1">Full Name</label>
<input class="w-full bg-surface-container-high border-none rounded-sm px-4 py-3 text-body-lg focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all" placeholder="John Appleseed" type="text" id="checkout-fullname">
</div>
<div class="md:col-span-2">
<label class="block text-label-md font-medium text-on-surface-variant mb-1.5 px-1">Street Address</label>
<input class="w-full bg-surface-container-high border-none rounded-sm px-4 py-3 text-body-lg focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all" placeholder="One Apple Park Way" type="text" id="checkout-address">
</div>
<div>
<label class="block text-label-md font-medium text-on-surface-variant mb-1.5 px-1">City</label>
<input class="w-full bg-surface-container-high border-none rounded-sm px-4 py-3 text-body-lg focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all" placeholder="Cupertino" type="text" id="checkout-city">
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-label-md font-medium text-on-surface-variant mb-1.5 px-1">State</label>
<input class="w-full bg-surface-container-high border-none rounded-sm px-4 py-3 text-body-lg focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all" placeholder="CA" type="text">
</div>
<div>
<label class="block text-label-md font-medium text-on-surface-variant mb-1.5 px-1">Zip</label>
<input class="w-full bg-surface-container-high border-none rounded-sm px-4 py-3 text-body-lg focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all" placeholder="95014" type="text">
</div>
</div>
</div>
</section>
<!-- Payment Section -->
<section>
<h2 class="text-headline-md font-semibold mb-6 flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="credit_card">credit_card</span>
                        Payment Method
                    </h2>
<div class="space-y-4">
<div class="flex gap-4 mb-6">
<button class="flex-1 bg-primary-container text-on-primary-container p-4 rounded-lg flex flex-col items-center gap-2 transition-all">
<span class="material-symbols-outlined" data-icon="contactless">contactless</span>
<span class="text-label-md">Apple Pay</span>
</button>
<button class="flex-1 bg-surface-container-high text-on-surface p-4 rounded-lg flex flex-col items-center gap-2 border border-outline-variant/15 hover:bg-surface-container-lowest transition-all">
<span class="material-symbols-outlined" data-icon="credit_card">credit_card</span>
<span class="text-label-md">Credit Card</span>
</button>
<button class="flex-1 bg-surface-container-high text-on-surface p-4 rounded-lg flex flex-col items-center gap-2 border border-outline-variant/15 hover:bg-surface-container-lowest transition-all">
<span class="material-symbols-outlined" data-icon="account_balance">account_balance</span>
<span class="text-label-md">Bank Transfer</span>
</button>
</div>
<div class="space-y-4 pt-4">
<div>
<label class="block text-label-md font-medium text-on-surface-variant mb-1.5 px-1">Card Number</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-sm px-4 py-3 text-body-lg focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all" placeholder="0000 0000 0000 0000" type="text">
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="lock">lock</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-label-md font-medium text-on-surface-variant mb-1.5 px-1">Expiry Date</label>
<input class="w-full bg-surface-container-high border-none rounded-sm px-4 py-3 text-body-lg focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all" placeholder="MM/YY" type="text">
</div>
<div>
<label class="block text-label-md font-medium text-on-surface-variant mb-1.5 px-1">CVV</label>
<input class="w-full bg-surface-container-high border-none rounded-sm px-4 py-3 text-body-lg focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all" placeholder="123" type="text">
</div>
</div>
</div>
</div>
</section>
</div>
<!-- Right Column: Summary -->
<div class="lg:col-span-5 sticky top-32">
<div class="bg-surface-container rounded-lg p-8 space-y-8">
<h2 class="text-headline-sm font-semibold">Order Summary</h2>
<div class="space-y-4 border-b border-outline-variant/15 pb-8" id="checkout-items-list">
<!-- Dynamically populated from cart -->
</div>
<div class="space-y-3">
<div class="flex justify-between text-body-lg">
<span class="text-on-surface-variant">Subtotal</span>
<span class="font-medium" id="checkout-subtotal">$0.00</span>
</div>
<div class="flex justify-between text-body-lg">
<span class="text-on-surface-variant">Shipping</span>
<span class="text-secondary font-medium">Free</span>
</div>
<div class="flex justify-between text-headline-sm font-semibold pt-4 border-t border-outline-variant/15">
<span>Total</span>
<span id="checkout-total">$0.00</span>
</div>
</div>
<button class="w-full bg-primary text-on-primary py-5 rounded-full text-title-md font-bold hover:shadow-xl hover:shadow-primary/20 hover:opacity-90 transition-all flex items-center justify-center gap-3">
                        Place Order
                        <span class="material-symbols-outlined">payments</span>
</button>
<p class="text-center text-label-sm text-on-surface-variant flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">lock</span>
                        Encrypted &amp; Secure Payment Processing
                    </p>
</div>
</div>
</div>
</main>
<script src="./js/cart.js"></script><script src="./js/main.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Simple script to show summary from localStorage
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const container = document.getElementById('checkout-items-list');
        let subtotal = 0;
        
        if (cart.length === 0) {
            container.innerHTML = '<p class="text-center py-4 text-slate-400 italic">Your bag is empty.</p>';
        } else {
            cart.forEach(item => {
                const itemTotal = item.price * (item.quantity || 1);
                subtotal += itemTotal;
                container.innerHTML += `
                    <div class="flex justify-between items-center group">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-surface-container-high rounded-sm flex items-center justify-center">
                                <span class="material-symbols-outlined text-outline" data-icon="smartphone">smartphone</span>
                            </div>
                            <div>
                                <p class="font-medium text-on-surface">${item.name}</p>
                                <p class="text-xs text-on-surface-variant">qty: ${item.quantity || 1}</p>
                            </div>
                        </div>
                        <span class="font-semibold" data-format="currency">$${itemTotal.toFixed(2)}</span>
                    </div>
                `;
            });
        }
        
        document.getElementById('checkout-subtotal').textContent = `$${subtotal.toFixed(2)}`;
        document.getElementById('checkout-total').textContent = `$${subtotal.toFixed(2)}`;
    });
</script>
</body></html>
