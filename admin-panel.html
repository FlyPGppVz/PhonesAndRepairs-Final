<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blink Service | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <!-- Auth Overlay -->
    <div id="authOverlay" class="fixed inset-0 z-[100] bg-slate-100 dark:bg-slate-950 flex flex-col items-center justify-center p-6">
        <div class="max-w-md w-full text-center slide-up">
            <img src="./assets/img/admin-logo.png" alt="Blink Service Logo" class="h-20 mx-auto mb-8 drop-shadow-xl">
            <h1 class="text-3xl font-bold mb-2">Blink Service CRUD</h1>
            <p class="text-slate-500 dark:text-slate-400 mb-8">Professional Inventory Management System</p>
            
            <div class="glass p-8 rounded-3xl shadow-2xl relative">
                <label class="block text-left text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">GitHub Personal Token</label>
                <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl p-4 mb-6 focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                <button onclick="saveToken()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/20 transition-all transform active:scale-95">
                    Acceder al Sistema
                </button>
            </div>
            <p class="mt-8 text-xs text-slate-400">Tus datos se guardan de forma segura en este navegador.</p>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainApp" class="hidden">
        <!-- Sidebar/Topnav -->
        <header class="fixed top-0 w-full glass z-50 border-b border-slate-200 dark:border-slate-800">
            <div class="max-w-[1440px] mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <img src="./assets/img/admin-logo.png" alt="Logo" class="h-10">
                    <div class="h-6 w-[1px] bg-slate-300 dark:bg-slate-700 mx-2"></div>
                    <span class="font-bold tracking-tight">ADMIN PANEL</span>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="logout()" class="flex items-center gap-2 text-sm font-medium text-slate-500 hover:text-red-500 transition-colors">
                        <span class="material-symbols-outlined text-xl">logout</span>
                        Cerrar Sesión
                    </button>
                </div>
            </div>
        </header>

        <main class="pt-32 pb-20 px-6 max-w-[1440px] mx-auto">
            <!-- Stats/Header -->
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
                <div>
                    <h2 class="text-4xl font-bold tracking-tight mb-2 italic">Product Factory</h2>
                    <p class="text-slate-500 dark:text-slate-400">Gestiona, crea y despliega productos instantáneamente.</p>
                </div>
                <button onclick="openModal()" class="flex items-center gap-2 bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-8 py-4 rounded-full font-bold shadow-xl hover:scale-105 transition-transform active:scale-95">
                    <span class="material-symbols-outlined">add_circle</span>
                    Nuevo Producto
                </button>
            </div>

            <!-- Product Grid -->
            <div id="inventoryGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Loader Skeleton -->
                <div class="animate-pulse bg-slate-200 dark:bg-slate-800 h-64 rounded-3xl"></div>
                <div class="animate-pulse bg-slate-200 dark:bg-slate-800 h-64 rounded-3xl"></div>
                <div class="animate-pulse bg-slate-200 dark:bg-slate-800 h-64 rounded-3xl"></div>
                <div class="animate-pulse bg-slate-200 dark:bg-slate-800 h-64 rounded-3xl"></div>
            </div>
        </main>
    </div>

    <!-- Create/Edit Modal -->
    <div id="productModal" class="hidden fixed inset-0 z-[200] bg-slate-950/50 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 max-w-2xl w-full rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-8 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                <h3 class="text-2xl font-bold italic" id="modalTitle">Nuevo Producto</h3>
                <button onclick="closeModal()" class="material-symbols-outlined text-slate-400 hover:text-slate-900 transition-colors">close</button>
            </div>
            
            <div class="p-8 overflow-y-auto">
                <form id="productForm" class="grid grid-cols-2 gap-6">
                    <div class="col-span-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 block">Nombre del Producto</label>
                        <input type="text" id="title" required class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl p-4 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 block">Precio (USD)</label>
                        <input type="number" step="0.01" id="price" required class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl p-4 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 block">Categoría</label>
                        <select id="category" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl p-4 focus:ring-2 focus:ring-blue-500 outline-none appearance-none">
                            <option value="iphone">iPhone</option>
                            <option value="samsung">Samsung</option>
                            <option value="ipad">iPad</option>
                            <option value="smartwatch">Apple Watch</option>
                            <option value="accessories">Accesorios</option>
                            <option value="consoles">Consolas</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 block">Descripción Corta (Hero)</label>
                        <input type="text" id="description" required class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl p-4 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="col-span-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 block">Imagen Principal</label>
                        <div class="flex items-center gap-4">
                            <div id="imagePreview" class="w-24 h-24 bg-slate-100 dark:bg-slate-800 rounded-2xl flex items-center justify-center overflow-hidden border border-slate-200 dark:border-slate-700">
                                <span class="material-symbols-outlined text-slate-300">image</span>
                            </div>
                            <input type="file" id="imageFile" accept="image/*" class="hidden" onchange="previewImage(this)">
                            <button type="button" onclick="document.getElementById('imageFile').click()" class="bg-slate-100 dark:bg-slate-800 px-6 py-4 rounded-xl text-sm font-semibold hover:bg-slate-200 transition-colors">Seleccionar Archivo</button>
                        </div>
                    </div>
                </form>
            </div>
            
            <div class="p-8 bg-slate-50 dark:bg-slate-800/50 flex gap-4">
                <button onclick="saveProduct()" id="saveBtn" class="flex-1 bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span id="saveBtnText">Generar y Desplegar</span>
                    <div id="btnLoader" class="hidden loader w-5 h-5 border-2 border-white/20 rounded-full"></div>
                </button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[300] bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl transform translate-y-32 transition-transform duration-500 flex items-center gap-3">
        <span class="material-symbols-outlined text-blue-400" id="toastIcon">check_circle</span>
        <span id="toastMsg" class="font-medium"></span>
    </div>

    <script>
        // CONFIGURATION
        const GITHUB_REPO = 'FlyPGppVz/PhonesAndRepairs-Final';
        const GITHUB_BRANCH = 'tienda-dinamica';
        const INVENTORY_PATH = 'data/inventory.json';
        const TEMPLATE_PATH = 'iphone-17-pro-max-detail.html';
        const PRODUCTS_DIR = 'products';
        const IMG_DIR = 'assets/img';

        let GITHUB_TOKEN = localStorage.getItem('gh_token');
        let inventory = [];
        let currentFileSha = '';
        let base64Image = null;
        let fileName = null;

        // AUTH LOGIC
        window.onload = () => {
            if (GITHUB_TOKEN) {
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                loadInventory();
            }
        };

        function saveToken() {
            const token = document.getElementById('ghToken').value;
            if (token.startsWith('ghp_')) {
                localStorage.setItem('gh_token', token);
                GITHUB_TOKEN = token;
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                loadInventory();
            } else {
                showToast('Token inválido. Debe empezar por ghp_', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('gh_token');
            location.reload();
        }

        // CRUD LOGIC
        async function loadInventory() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${INVENTORY_PATH}?ref=${GITHUB_BRANCH}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                const data = await response.json();
                currentFileSha = data.sha;
                inventory = JSON.parse(atob(data.content));
                renderInventory();
            } catch (err) {
                showToast('Error al cargar inventario. Revisa el Token.', 'error');
            }
        }

        function renderInventory() {
            const grid = document.getElementById('inventoryGrid');
            grid.innerHTML = inventory.map((item, index) => `
                <div class="glass p-6 rounded-[2rem] group hover:border-blue-500/50 transition-all">
                    <div class="h-40 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-4 flex items-center justify-center overflow-hidden">
                        <img src="${item.image}" class="h-[80%] object-contain group-hover:scale-110 transition-transform duration-500">
                    </div>
                    <div class="flex justify-between items-start mb-1">
                        <h4 class="font-bold text-lg">${item.title}</h4>
                        <span class="text-blue-600 font-bold">$${item.price}</span>
                    </div>
                    <p class="text-xs text-slate-500 dark:text-slate-400 mb-4 h-10 overflow-hidden line-clamp-2">${item.description}</p>
                    <div class="flex gap-2">
                        <button onclick="deleteProduct(${index})" class="p-2 rounded-xl bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-all">
                            <span class="material-symbols-outlined text-xl italic">delete</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // IMAGE PREVIEW
        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                fileName = `prod_${Date.now()}_${file.name.replace(/\s/g, '_')}`;
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64Image = e.target.result.split(',')[1];
                    document.getElementById('imagePreview').innerHTML = `<img src="${e.target.result}" class="h-full w-full object-contain p-2">`;
                };
                reader.readAsDataURL(file);
            }
        }

        // SAVE LOGIC
        async function saveProduct() {
            const title = document.getElementById('title').value;
            const price = parseFloat(document.getElementById('price').value);
            const description = document.getElementById('description').value;
            const category = document.getElementById('category').value;

            if (!title || !price || !base64Image) {
                showToast('Por favor completa todos los campos incluyen la imagen.', 'error');
                return;
            }

            setLoading(true);
            try {
                // 1. Upload Image to Assets
                const imgPath = `${IMG_DIR}/${fileName}`;
                await githubCommit(imgPath, base64Image, `Upload image for ${title}`);

                // 2. Generate and Upload Detail Page
                const slug = title.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]/g, '');
                const detailPagePath = `${PRODUCTS_DIR}/${slug}.html`;
                const newHtml = await generateDetailPage(title, price, description, imgPath);
                await githubCommit(detailPagePath, btoa(unescape(encodeURIComponent(newHtml))), `Generate detail page for ${title}`);

                // 3. Update Inventory JSON
                const newItem = {
                    title,
                    price,
                    description,
                    image: `./${imgPath}`,
                    category,
                    url: `./${detailPagePath}`
                };
                inventory.push(newItem);
                await githubCommit(INVENTORY_PATH, btoa(JSON.stringify(inventory, null, 2)), `Add ${title} to inventory`, currentFileSha);

                showToast('Producto creado y desplegado con éxito!');
                closeModal();
                loadInventory();
            } catch (err) {
                console.error(err);
                showToast('Error en la sincronización. Revisa la consola.', 'error');
            } finally {
                setLoading(false);
            }
        }

        async function generateDetailPage(title, price, description, imgPath) {
            // Fetch Template
            const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${TEMPLATE_PATH}?ref=${GITHUB_BRANCH}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            const data = await response.json();
            let html = decodeURIComponent(escape(atob(data.content)));

            // Replacement Logic (Crude but Effective for this use case)
            // Fix relative paths for the subfolder
            html = html.replace(/\.\/css\//g, '../css/');
            html = html.replace(/\.\/js\//g, '../js/');
            html = html.replace(/\.\/assets\//g, '../assets/');
            html = html.replace(/\.\/index\.html/g, '../index.html');
            html = html.replace(/\.\/shop-fully-connected\.html/g, '../shop-fully-connected.html');

            // Replace Product Specifics
            // Regex to find the title tag content
            html = html.replace(/<title>.*?<\/title>/, `<title>${title} | Phones & Repairs</title>`);
            // Hero Title
            html = html.replace(/<h1 class=".*?">iPhone 17 Pro Max<\/h1>/, `<h1 class="text-5xl md:text-6xl font-bold tracking-tight text-on-surface mb-4">${title}</h1>`);
            // Description Hero
            html = html.replace(/<p class="text-on-surface-variant text-lg max-w-md mb-6">.*?<\/p>/, `<p class="text-on-surface-variant text-lg max-w-md mb-6">${description}.</p>`);
            // Price
            html = html.replace(/<div class="product-price text-3xl font-semibold text-on-surface transition-all">\$1,299.00<\/div>/, `<div class="product-price text-3xl font-semibold text-on-surface transition-all">$${price.toFixed(2)}</div>`);
            // Main Image
            html = html.replace(/id="main-product-image" class=".*?" src=".*?"/, `id="main-product-image" class="product-main-image max-w-full h-[70%] md:h-[80%] object-contain drop-shadow-2xl transition-all duration-500 scale-105" src="../${imgPath}"`);
            
            // Remove color buttons or other iPhone specific things if needed (optional)
            
            return html;
        }

        async function githubCommit(path, content, message, sha = null) {
            const body = {
                message,
                content,
                branch: GITHUB_BRANCH
            };
            if (sha) body.sha = sha;

            const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });
            return await response.json();
        }

        async function deleteProduct(index) {
            if(!confirm('¿Estás seguro de eliminar este producto?')) return;
            
            const item = inventory[index];
            inventory.splice(index, 1);
            
            try {
                await githubCommit(INVENTORY_PATH, btoa(JSON.stringify(inventory, null, 2)), `Delete ${item.title}`, currentFileSha);
                showToast('Producto eliminado');
                loadInventory();
            } catch (err) {
                showToast('Error al eliminar', 'error');
            }
        }

        // UI HELPERS
        function openModal() {
            document.getElementById('productModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('productModal').classList.add('hidden');
            document.getElementById('productForm').reset();
            document.getElementById('imagePreview').innerHTML = '<span class="material-symbols-outlined text-slate-300">image</span>';
            base64Image = null;
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('saveBtn');
            const text = document.getElementById('saveBtnText');
            const loader = document.getElementById('btnLoader');
            if (isLoading) {
                btn.disabled = true;
                text.classList.add('hidden');
                loader.classList.remove('hidden');
            } else {
                btn.disabled = false;
                text.classList.remove('hidden');
                loader.classList.add('hidden');
            }
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const toastIcon = document.getElementById('toastIcon');
            
            toastMsg.innerText = msg;
            toastIcon.innerText = type === 'success' ? 'check_circle' : 'error';
            toastIcon.className = type === 'success' ? 'material-symbols-outlined text-blue-400' : 'material-symbols-outlined text-red-500';
            
            toast.classList.remove('translate-y-32');
            setTimeout(() => toast.classList.add('translate-y-32'), 3000);
        }
    </script>
</body>
</html>
