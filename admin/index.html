<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHONES AND REPAIRS - Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    /* Ocultar el logo original y el footer de Netlify */
    .netlify-identity-logo, .netlify-identity-footer, .coded-by {
      display: none !important;
    }

    /* Ocultar el logo de Decap (v3) */
    div[class*="LogoContainer"], 
    div[class*="LoginLogo"],
    svg[class*="Logo"] {
      display: none !important;
    }

    /* Inyectar el logotipo de Blink Service */
    div[class*="LoginPage"]::before {
      content: "";
      display: block;
      width: 100%;
      height: 120px;
      background: url('/assets/img/admin-logo.png') no-repeat center center;
      background-size: contain;
      margin-bottom: 2rem;
    }
    
    /* Ajustes generales para un look más limpio */
    body {
      background-color: #f3f4f6 !important;
    }
  </style>
</head>
<body>
  <!-- Decap CMS Script -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
