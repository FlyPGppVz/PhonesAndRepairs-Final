<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHONES AND REPAIRS - Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    /* Ocultar logo de Decap y branding de Netlify en el widget */
    #netlify-identity-widget, 
    .netlify-identity-menu,
    .netlify-identity-logo,
    .netlify-identity-footer,
    .netlify-identity-providers button::after {
        display: none !important;
    }

    /* Ocultar el texto "Coded by Netlify" y logos internos */
    [data-netlify-identity-menu] svg,
    .nc-app-header-logo svg {
        display: none !important;
    }

    /* Cambiar el color del botón para que sea neutro y profesional */
    .netlify-identity-button {
        background-color: #1f2937 !important; /* Gris oscuro profesional */
        color: white !important;
    }
  </style>
</head>
<body>
  <!-- Decap CMS Script -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script>
    // ESTE ES EL PUENTE DE CONEXIÓN OBLIGATORIO PARA GITHUB PAGES
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
      // Importante: Referencia directa a tu API de Netlify
      window.netlifyIdentity.init({
        APIUrl: "https://phonesandrepairs-final.netlify.app/.netlify/identity"
      });
    }
  </script>
</body>
</html>
