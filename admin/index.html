<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHONES AND REPAIRS - Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- Decap CMS Script -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script>
    // 1. Puente de conexión para GitHub Pages
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
      window.netlifyIdentity.init({
        APIUrl: "https://phonesandrepairs-final.netlify.app/.netlify/identity"
      });
    }

    // 2. Observador inteligente para ocultar el branding (Tu script)
    const observer = new MutationObserver((mutations) => {
      // Buscamos el iframe o los elementos del widget
      const logo = document.querySelector('.netlify-identity-logo, .nc-app-header-logo, .netlify-identity-footer');
      if (logo) {
        logo.style.display = 'none';
        logo.style.opacity = '0';
        logo.style.visibility = 'hidden';
      }
      
      // Intentamos limpiar el texto del footer del widget
      const frames = document.getElementsByTagName('iframe');
      for (let i = 0; i < frames.length; i++) {
        try {
          const frameDoc = frames[i].contentDocument || frames[i].contentWindow.document;
          const frameLogo = frameDoc.querySelector('.logo, .footer, .btn-netlify');
          if (frameLogo) {
            frameLogo.style.display = 'none';
          }
        } catch (e) {
          // A veces el navegador bloquea el acceso al iframe por seguridad
        }
      }
    });

    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
