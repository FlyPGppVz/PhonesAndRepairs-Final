<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Shop CRUD | PhonesAndRepairs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass {
            background: rgba(20, 20, 20, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
    <script src="../js/supabase-config.js"></script>
</head>
<body class="bg-[#f5f5f7] dark:bg-neutral-950 text-slate-900 dark:text-white min-h-screen">

    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-bold tracking-tight">Shop Inventory</h1>
                <p class="text-slate-500 mt-2">Manage products, variants and bento-specs.</p>
            </div>
            <div class="flex items-center gap-4">
                <a href="../shop-fully-connected.html" class="flex items-center gap-2 text-slate-500 hover:text-blue-600 transition-colors font-medium">
                    <span class="material-symbols-outlined">shopping_bag</span> Ver Tienda
                </a>
                <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-full font-semibold transition-all flex items-center gap-2 shadow-lg shadow-blue-500/20">
                    <span class="material-symbols-outlined">add</span> New Product
                </button>
            </div>
        </header>

        <!-- Product Grid -->
        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Items injected by JS -->
        </div>
    </div>

    <!-- Admin Modal (Glassmorphism) -->
    <div id="product-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden p-4">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="glass w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden relative max-h-[90vh] flex flex-col">
            <div class="p-8 overflow-y-auto">
                <h2 id="modal-title" class="text-2xl font-bold mb-6">Add New Product</h2>
                <form id="product-form" class="space-y-6">
                    <input type="hidden" id="product-id">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Title</label>
                            <input type="text" id="title" required class="w-full bg-slate-100 dark:bg-white/5 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Slug</label>
                            <input type="text" id="slug" required placeholder="iphone-17-pro-max" class="w-full bg-slate-100 dark:bg-white/5 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Price</label>
                            <input type="number" id="price" required step="0.01" class="w-full bg-slate-100 dark:bg-white/5 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Description</label>
                        <textarea id="description" rows="3" class="w-full bg-slate-100 dark:bg-white/5 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 transition-all outline-none"></textarea>
                    </div>

                    <div class="border-t border-slate-200 dark:border-white/10 pt-6">
                        <h3 class="text-sm font-bold uppercase tracking-widest mb-4">Color Variants</h3>
                        <div id="variants-container" class="space-y-4">
                            <!-- Dynamic Variants -->
                        </div>
                        <button type="button" onclick="addVariantRow()" class="mt-4 text-blue-500 text-sm font-semibold flex items-center gap-1 hover:text-blue-600">
                            <span class="material-symbols-outlined text-sm">add_circle</span> Add Color Variant
                        </button>
                    </div>

                    <div class="border-t border-slate-200 dark:border-white/10 pt-6 grid grid-cols-2 gap-4">
                        <div class="col-span-2"><h3 class="text-sm font-bold uppercase tracking-widest">Bento Grid Specs</h3></div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400">Processor Title</label>
                            <input type="text" id="processor_title" class="w-full bg-slate-100 dark:bg-white/5 border-none rounded-lg px-3 py-2 text-sm outline-none mt-1">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400">Display Nits</label>
                            <input type="text" id="display_nits" class="w-full bg-slate-100 dark:bg-white/5 border-none rounded-lg px-3 py-2 text-sm outline-none mt-1">
                        </div>
                    </div>

                    <div class="flex justify-end gap-3 pt-8 pb-4">
                        <button type="button" onclick="closeModal()" class="px-6 py-3 rounded-full font-semibold hover:bg-slate-200 dark:hover:bg-white/5 transition-all">Cancel</button>
                        <button type="submit" class="bg-black dark:bg-white dark:text-black text-white px-8 py-3 rounded-full font-bold shadow-lg active:scale-95 transition-all">Save Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let currentVariants = [];

        async function fetchProducts() {
            const { data, error } = await _supabase.from('shop_products').select('*').order('created_at', { ascending: false });
            if (error) console.error(error);
            renderProducts(data || []);
        }

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = products.map(p => `
                <div class="glass rounded-3xl p-6 transition-all hover:shadow-xl group">
                    <div class="h-48 bg-slate-200 dark:bg-white/5 rounded-2xl mb-4 overflow-hidden relative">
                        <img src="${p.main_image_url || ''}" class="w-full h-full object-contain p-4 group-hover:scale-105 transition-transform duration-500">
                        <div class="absolute top-3 right-3 flex gap-2">
                             <button onclick="editProduct('${p.id}')" class="w-8 h-8 rounded-full bg-white/90 dark:bg-black/60 flex items-center justify-center text-blue-500 shadow-sm"><span class="material-symbols-outlined text-sm">edit</span></button>
                             <button onclick="deleteProduct('${p.id}')" class="w-8 h-8 rounded-full bg-white/90 dark:bg-black/60 flex items-center justify-center text-red-500 shadow-sm"><span class="material-symbols-outlined text-sm">delete</span></button>
                        </div>
                    </div>
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg">${p.title}</h3>
                            <p class="text-xs text-slate-500 font-mono tracking-tighter uppercase">${p.category || 'N/A'}</p>
                        </div>
                        <span class="font-bold text-blue-600">$ ${p.price}</span>
                    </div>
                </div>
            `).join('');
        }

        function addVariantRow(variant = { color: '#000000', label: '', image: '' }) {
            const container = document.getElementById('variants-container');
            const row = document.createElement('div');
            row.className = "flex gap-2 items-end animate-in fade-in slide-in-from-top-2";
            row.innerHTML = `
                <div class="flex-none">
                    <input type="color" value="${variant.color}" class="variant-color w-10 h-11 rounded-lg border-none bg-transparent cursor-pointer">
                </div>
                <div class="flex-1">
                    <input type="text" placeholder="Label (e.g. Black)" value="${variant.label}" class="variant-label w-full bg-slate-100 dark:bg-white/5 border-none rounded-xl px-3 py-2 text-sm">
                </div>
                <div class="flex-[2]">
                    <input type="text" placeholder="Image URL" value="${variant.image}" class="variant-image w-full bg-slate-100 dark:bg-white/5 border-none rounded-xl px-3 py-2 text-sm">
                </div>
                <button type="button" onclick="this.parentElement.remove()" class="p-2 text-red-400 hover:text-red-500"><span class="material-symbols-outlined">delete</span></button>
            `;
            container.appendChild(row);
        }

        async function editProduct(id) {
            const { data } = await _supabase.from('shop_products').select('*').eq('id', id).single();
            if(!data) return;
            
            document.getElementById('product-id').value = data.id;
            document.getElementById('title').value = data.title;
            document.getElementById('slug').value = data.slug;
            document.getElementById('price').value = data.price;
            document.getElementById('description').value = data.description;
            document.getElementById('processor_title').value = data.processor_title;
            document.getElementById('display_nits').value = data.display_nits;
            
            document.getElementById('variants-container').innerHTML = '';
            (data.variants || []).forEach(v => addVariantRow(v));
            
            document.getElementById('modal-title').innerText = "Edit Product";
            openModal();
        }

        async function saveProduct(e) {
            e.preventDefault();
            const id = document.getElementById('product-id').value;
            
            const variantRows = document.querySelectorAll('#variants-container > div');
            const variants = Array.from(variantRows).map(row => ({
                color: row.querySelector('.variant-color').value,
                label: row.querySelector('.variant-label').value,
                image: row.querySelector('.variant-image').value
            }));

            const productData = {
                title: document.getElementById('title').value,
                slug: document.getElementById('slug').value,
                price: parseFloat(document.getElementById('price').value),
                description: document.getElementById('description').value,
                processor_title: document.getElementById('processor_title').value,
                display_nits: document.getElementById('display_nits').value,
                variants: variants,
                main_image_url: variants[0]?.image || ''
            };

            const { error } = id 
                ? await _supabase.from('shop_products').update(productData).eq('id', id)
                : await _supabase.from('shop_products').insert([productData]);

            if (error) {
                alert(error.message);
            } else {
                closeModal();
                fetchProducts();
            }
        }

        async function deleteProduct(id) {
            if(!confirm('Delete this product?')) return;
            await _supabase.from('shop_products').delete().eq('id', id);
            fetchProducts();
        }

        function openModal() {
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('product-modal').classList.add('hidden');
            document.getElementById('product-form').reset();
            document.getElementById('product-id').value = '';
            document.getElementById('variants-container').innerHTML = '';
            document.getElementById('modal-title').innerText = "Add New Product";
        }

        document.getElementById('product-form').onsubmit = saveProduct;
        fetchProducts();
    </script>
</body>
</html>
