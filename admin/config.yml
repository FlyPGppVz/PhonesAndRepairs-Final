backend:
  name: github
  repo: flypgppvz/PhonesAndRepairs-Final
  branch: tienda-dinamica

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "inventario"
    label: "Mis Productos"
    folder: "data"
    extension: "json"
    format: "json"
    create: true
    slug: "{{title}}"
    fields:
      - {label: "Nombre del Producto", name: "title", widget: "string"}
      - {label: "Precio", name: "price", widget: "number", value_type: "float"}
      - {label: "Descripción", name: "description", widget: "text"}
      - {label: "Imagen", name: "image", widget: "image"}
      - {label: "Categoría", name: "category", widget: "select", options: ["iphone", "samsung", "ipad", "smartwatch", "accessories", "consoles", "service"]}
