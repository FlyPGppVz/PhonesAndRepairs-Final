<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Blink Service & Cellphones And Repair</title>
    
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9fafb; color: #111827; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .sidebar-link { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-link.active { background-color: #f3f4f6; color: #000; font-weight: 700; border-left: 4px solid #3b82f6; }
        .product-card { background: white; border: 1px solid rgba(0,0,0,0.05); transition: transform 0.2s, box-shadow 0.2s; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -10px rgba(0,0,0,0.1); }
        .btn-primary { background: #000; color: #fff; transition: all 0.2s; }
        .btn-primary:hover { background: #333; transform: scale(1.02); }
        .modal-bg { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- HEADER (Original Blink Branding) -->
    <header class="glass-header sticky top-0 z-40 h-20 flex items-center px-10 justify-between">
        <div class="flex items-center gap-6">
            <img src="../assets/images/logo-transparent.png" alt="Cellphones and Repair" class="h-10 opacity-90">
            <div class="h-6 w-[1.5px] bg-slate-200"></div>
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-blue-600 font-bold">bolt</span>
                <span class="font-extrabold tracking-tighter text-xl">BLINK<span class="text-blue-600">SERVICE</span></span>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="hidden md:flex flex-col text-right">
                <span id="admin-name" class="text-sm font-bold">Administrator</span>
                <span id="admin-email" class="text-[10px] text-slate-400 font-medium">syncing with cloud...</span>
            </div>
            <button onclick="AuthManager.logout()" class="p-3 hover:bg-red-50 text-red-500 rounded-full transition-colors">
                <span class="material-symbols-outlined">logout</span>
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-72 border-r border-slate-100 bg-white flex flex-col p-6 gap-2">
            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4 px-4">Management</div>
            <button class="sidebar-link active flex items-center gap-4 px-4 py-3 rounded-2xl w-full text-sm">
                <span class="material-symbols-outlined">inventory_2</span> Inventory Control
            </button>
            <button class="sidebar-link text-slate-500 flex items-center gap-4 px-4 py-3 rounded-2xl w-full text-sm hover:bg-slate-50">
                <span class="material-symbols-outlined">shopping_bag</span> Orders
            </button>
            <button class="sidebar-link text-slate-500 flex items-center gap-4 px-4 py-3 rounded-2xl w-full text-sm hover:bg-slate-50">
                <span class="material-symbols-outlined">settings</span> System Config
            </button>
            
            <div class="mt-auto p-4 bg-blue-50 rounded-2xl">
                <div class="text-[10px] font-bold text-blue-600 uppercase mb-1">Terminal Status</div>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-[11px] font-bold">Connected to Supabase</span>
                </div>
            </div>
        </aside>

        <!-- MAIN TABLE -->
        <main class="flex-1 p-12 overflow-y-auto bg-[#fdfdfe]">
            <div class="max-w-6xl mx-auto space-y-10">
                <div class="flex justify-between items-end">
                    <div>
                        <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">Inventory Catalog</h1>
                        <p class="text-slate-500 mt-2 font-medium">Manage your products and service listings with Blink efficiency.</p>
                    </div>
                    <button onclick="openModal()" class="btn-primary flex items-center gap-3 px-8 py-4 rounded-2xl font-bold shadow-xl shadow-black/5">
                        <span class="material-symbols-outlined">add</span> Create Asset
                    </button>
                </div>

                <!-- Grid List -->
                <div id="inventory-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- Dynamic Items -->
                </div>
            </div>
        </main>
    </div>

    <!-- CLEAN EDIT MODAL -->
    <div id="productModal" class="fixed inset-0 z-50 flex items-center justify-center p-8 hidden">
        <div class="absolute inset-0 modal-bg" onclick="closeModal()"></div>
        <div class="bg-white w-full max-w-4xl rounded-[3rem] shadow-[0_40px_100px_-20px_rgba(0,0,0,0.15)] relative z-10 overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-10 border-b border-slate-50 flex justify-between items-center">
                <div>
                    <h2 id="modalTitle" class="text-2xl font-black tracking-tight">Register New Asset</h2>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">Product Details</p>
                </div>
                <button onclick="closeModal()" class="p-3 hover:bg-slate-50 rounded-full transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <form id="productForm" class="flex-1 overflow-y-auto p-12 space-y-10 custom-scrollbar">
                <input type="hidden" name="id">
                
                <div class="grid grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Product Name</label>
                        <input type="text" name="name" required class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 font-bold focus:ring-2 ring-blue-500 transition-all">
                    </div>
                    <div class="space-y-4">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Category</label>
                        <select name="category" class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 font-bold">
                            <option value="iPhones">iPhones</option>
                            <option value="Samsung">Samsung</option>
                            <option value="iPads">iPads</option>
                            <option value="Consoles">Consoles</option>
                            <option value="Smartwatch">Smartwatch</option>
                            <option value="Accessories">Accessories</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Base Price (USD)</label>
                        <input type="number" step="0.01" name="price" required class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 font-bold">
                    </div>
                    <div class="space-y-4">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Stock Quantity</label>
                        <input type="number" name="stock_quantity" value="1" class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 font-bold">
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Main Image Source</label>
                    <input type="text" name="main_image_url" placeholder="https://..." required class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 font-mono text-sm">
                </div>

                <div class="grid grid-cols-1 gap-8 pt-6 border-t border-slate-50">
                     <h3 class="font-extrabold text-lg">Editorial Content</h3>
                     <div class="space-y-4">
                         <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Marketing Headline</label>
                         <input type="text" name="marketing_title" class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 font-bold">
                     </div>
                     <div class="space-y-4">
                         <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Description</label>
                         <textarea name="marketing_description" rows="3" class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 font-medium"></textarea>
                     </div>
                </div>
            </form>

            <div class="p-10 border-t border-slate-50 bg-slate-50/50 flex justify-end gap-4">
                <button onclick="closeModal()" class="px-8 py-4 font-bold text-slate-500">Discard</button>
                <button type="submit" form="productForm" class="btn-primary px-10 py-4 rounded-2xl font-bold shadow-lg">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // INIT
        document.addEventListener('DOMContentLoaded', async () => {
            await loader();
            loadInventory();
        });

        async function loader() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                document.getElementById('admin-email').textContent = session.user.email;
            }
        }

        async function loadInventory() {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = `<div class="col-span-full py-40 text-center text-slate-300 font-bold uppercase tracking-widest animate-pulse">Syncing catalog...</div>`;
            
            try {
                const { data, error } = await _supabase.from('products').select('*').order('created_at', { ascending: false });
                if (error) throw error;

                grid.innerHTML = data.map(p => `
                    <div class="product-card rounded-[2.5rem] p-6 flex flex-col gap-6">
                        <div class="h-48 bg-slate-50 rounded-[2rem] flex items-center justify-center p-8 overflow-hidden relative">
                            <img src="${p.main_image_url}" class="max-w-full max-h-full object-contain drop-shadow-xl" onerror="this.src='https://placehold.co/400x400?text=No+Image'">
                            <span class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[9px] font-black tracking-widest shadow-sm">${p.category}</span>
                        </div>
                        <div class="px-2">
                            <h3 class="font-extrabold text-xl tracking-tight truncate">${p.name}</h3>
                            <div class="flex justify-between items-center mt-6">
                                <span class="text-2xl font-black text-blue-600">$${p.price}</span>
                                <div class="flex gap-2">
                                    <button onclick="editProduct('${p.id}')" class="p-3 hover:bg-slate-100 rounded-full transition-all">
                                        <span class="material-symbols-outlined text-sm">edit</span>
                                    </button>
                                    <button onclick="deleteProduct('${p.id}')" class="p-3 hover:bg-red-50 text-red-500 rounded-full transition-all">
                                        <span class="material-symbols-outlined text-sm">delete</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
                if (data.length === 0) grid.innerHTML = `<div class="col-span-full py-20 text-center opacity-30">Catalog is empty</div>`;
            } catch (err) { alert('Sync fail. Check console.'); console.error(err); }
        }

        function openModal() {
            document.getElementById('productModal').classList.remove('hidden');
            document.getElementById('modalTitle').textContent = 'Register New Asset';
            document.getElementById('productForm').reset();
            document.getElementById('productForm').dataset.editId = '';
        }

        function closeModal() {
            document.getElementById('productModal').classList.add('hidden');
        }

        async function editProduct(id) {
            const { data, error } = await _supabase.from('products').select('*').eq('id', id).single();
            if (!error && data) {
                openModal();
                document.getElementById('modalTitle').textContent = 'Modify Asset';
                const f = document.getElementById('productForm');
                f.dataset.editId = data.id;
                f.name.value = data.name;
                f.price.value = data.price;
                f.category.value = data.category;
                f.main_image_url.value = data.main_image_url;
                f.marketing_title.value = data.marketing_title || '';
                f.marketing_description.value = data.marketing_description || '';
            }
        }

        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            const f = e.target;
            const editId = f.dataset.editId;
            const data = new FormData(f);
            
            const payload = {
                name: data.get('name'),
                price: parseFloat(data.get('price')),
                category: data.get('category'),
                main_image_url: data.get('main_image_url'),
                marketing_title: data.get('marketing_title'),
                marketing_description: data.get('marketing_description'),
                stock_quantity: parseInt(data.get('stock_quantity')) || 0
            };

            const btn = f.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'SAVING...';

            try {
                let error;
                if (editId) {
                    const { error: err } = await _supabase.from('products').update(payload).eq('id', editId);
                    error = err;
                } else {
                    const { error: err } = await _supabase.from('products').insert([payload]);
                    error = err;
                }

                if (error) throw error;
                closeModal();
                loadInventory();
            } catch (err) { alert(err.message); }
            finally { btn.disabled = false; btn.textContent = 'Save Changes'; }
        }

        async function deleteProduct(id) {
            if (confirm('Eliminar permanentemente este activo?')) {
                const { error } = await _supabase.from('products').delete().eq('id', id);
                if (!error) loadInventory();
            }
        }
    </script>
</body>
</html>
