<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Product Detail | CellphonesAndRepair</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/tailwind-config.js"></script>
    <script src="./js/supabase-config.js"></script>
</head>
<body class="bg-background text-on-surface dark:bg-neutral-950 dark:text-white transition-colors duration-500">
    
    <!-- Navbar Component Wrapper -->
    <div id="navbar-placeholder"></div>

    <main id="main-content" class="pt-24 pb-20 px-4 md:px-8 max-w-[1440px] mx-auto opacity-0 transition-opacity duration-700">
        <!-- Hero Section -->
        <section class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start mb-24">
            <!-- Image Column -->
            <div class="lg:col-span-7 relative h-[600px] md:h-[800px] bg-slate-100 dark:bg-[#1a1c1e] rounded-3xl overflow-hidden flex flex-col items-center justify-center p-8 md:p-12">
                <img id="product-img" class="max-w-full h-[70%] object-contain drop-shadow-2xl transition-all duration-700 scale-100 hover:scale-105" src="" alt="Product">
                
                <!-- Dynamic Color Selector -->
                <div id="color-selector" class="mt-8 flex gap-6 z-10 bg-white/20 dark:bg-black/20 backdrop-blur-xl p-4 rounded-3xl border border-white/20 shadow-xl">
                    <!-- Colors load here -->
                </div>
            </div>

            <!-- Configuration Column -->
            <div class="lg:col-span-5 flex flex-col justify-center sticky top-24">
                <div class="mb-8">
                    <span id="product-badge" class="text-blue-500 font-bold tracking-widest text-[11px] uppercase mb-3 block">Premium Selection</span>
                    <h1 id="product-title" class="text-5xl md:text-6xl font-bold tracking-tight mb-4">Loading...</h1>
                    <p id="product-desc" class="text-slate-500 dark:text-slate-400 text-lg max-w-md mb-6"></p>
                    <div id="product-price" class="text-3xl font-semibold">$0.00</div>
                </div>

                <!-- Action Group -->
                <div class="flex flex-col gap-4">
                    <button class="w-full py-5 bg-blue-600 text-white rounded-full font-bold text-lg flex items-center justify-center gap-2 hover:bg-blue-700 transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                        Add to Cart <span class="material-symbols-outlined">shopping_bag</span>
                    </button>
                    <button class="w-full py-5 bg-black dark:bg-white dark:text-black text-white rounded-full font-bold text-lg hover:opacity-90 transition-all active:scale-95">
                        Buy Now
                    </button>
                </div>
            </div>
        </section>

        <!-- Bento Grid Specs -->
        <section class="mb-24">
            <div class="text-center mb-16">
                <h2 class="text-4xl font-bold tracking-tight mb-4">Engineering Precision.</h2>
                <p class="text-slate-500 dark:text-slate-400 text-lg">Every component refined for professional peak performance.</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 grid-rows-2 gap-6 h-auto md:h-[600px]">
                <div class="md:col-span-2 md:row-span-2 bg-neutral-900 text-white rounded-3xl p-10 flex flex-col justify-between overflow-hidden relative">
                    <div>
                        <h3 id="spec-processor-title" class="text-3xl font-bold mb-4">Processor</h3>
                        <p id="spec-processor-desc" class="text-white/60 text-lg leading-relaxed max-w-sm"></p>
                    </div>
                    <img id="spec-processor-img" class="absolute -bottom-10 -right-10 w-64 h-64 object-contain opacity-40 grayscale" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDiCUA8fNzIIhveg0rUnHX42JYUyXDeDTeULf4oz2mRA2QOIBm4BmUOt_7p4Ao9dsJc3QCWDL_7Db9eghKYBJjH5DlF8hX1DiFsfzC-ynANKu58o_TMa56HQg0quuTjfJD6uL-ZcjfQbX8v92N-RFo_-YCm83IZacJ2DkVviHHW3rE3ya3ladg_nNfuXjE0Zibm2h2SicXSgqtZY156CBu5WoqPJJ2UYGVHs6W9oTEbaupkYfmTRKrBXkM37NQkgmu5KV03Lt_0_Lo">
                </div>
                <div class="md:col-span-2 bg-white dark:bg-white/5 rounded-3xl p-10 flex flex-col justify-between border border-slate-200 dark:border-white/10">
                    <h3 class="text-2xl font-bold mb-2">Display</h3>
                    <div class="flex items-end gap-8">
                        <div>
                            <p id="spec-display-nits" class="text-3xl font-bold">--</p>
                            <p class="text-[10px] uppercase tracking-widest font-bold text-slate-400">Peak Brightness</p>
                        </div>
                    </div>
                </div>
                <!-- Battery -->
                <div class="md:col-span-2 bg-slate-100 dark:bg-white/5 rounded-3xl p-8 flex items-center justify-between">
                    <div>
                         <h3 class="font-bold">Battery Life</h3>
                         <p id="spec-battery-desc" class="text-sm text-slate-500 mt-2"></p>
                    </div>
                    <span class="material-symbols-outlined text-blue-500 text-4xl">battery_charging_full</span>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug') || 'iphone-17-pro-max';

            const { data: product, error } = await _supabase
                .from('shop_products')
                .select('*')
                .eq('slug', slug)
                .single();

            if (error || !product) {
                console.error('Error fetching product:', error);
                document.getElementById('product-title').innerText = "Product Not Found";
                return;
            }

            // Populate Text
            document.getElementById('product-title').innerText = product.title;
            document.getElementById('product-desc').innerText = product.description;
            document.getElementById('product-price').innerText = `$ ${product.price}`;
            document.getElementById('spec-processor-title').innerText = product.processor_title;
            document.getElementById('spec-processor-desc').innerText = product.processor_desc;
            document.getElementById('spec-display-nits').innerText = product.display_nits;
            document.getElementById('spec-battery-desc').innerText = product.battery_desc;

            // Render Variants
            const selector = document.getElementById('color-selector');
            if (product.variants && product.variants.length > 0) {
                selector.innerHTML = product.variants.map((v, i) => `
                    <button onclick="updateColor('${v.image}', '${v.label}', this)" 
                            class="w-8 h-8 rounded-full border-2 ${i === 0 ? 'border-blue-500 scale-125' : 'border-transparent'} transition-all ring-offset-2 ring-offset-transparent hover:scale-110" 
                            style="background-color: ${v.color}"
                            title="${v.label}">
                    </button>
                `).join('');
                
                // Set initial image
                updateColor(product.variants[0].image, product.variants[0].label, selector.firstChild);
            }

            // Show Content
            document.getElementById('main-content').classList.remove('opacity-0');
        });

        function updateColor(imgUrl, label, btn) {
            document.getElementById('product-img').src = imgUrl;
            // Update active state in buttons
            document.querySelectorAll('#color-selector button').forEach(b => {
                b.classList.replace('border-blue-500', 'border-transparent');
                b.classList.remove('scale-125');
            });
            if(btn) {
                btn.classList.replace('border-transparent', 'border-blue-500');
                btn.classList.add('scale-125');
            }
        }
    </script>
</body>
</html>
