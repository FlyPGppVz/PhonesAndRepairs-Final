<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Gallery</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        img { max-width: 100%; height: 150px; object-contain: contain; display: block; margin: 0 auto 10px; }
        .name { font-size: 12px; word-break: break-all; color: #555; }
    </style>
</head>
<body>
    <h1>Referential Assets</h1>
    <div class="grid" id="referential">
        <div class="card"><img src="./assets/images/referential/IMG_3783.jpeg"><div class="name">IMG_3783 (Screen Protector?)</div></div>
        <div class="card"><img src="./assets/images/referential/IMG_3842.jpeg"><div class="name">IMG_3842 (Devices?)</div></div>
        <div class="card"><img src="./assets/images/referential/IMG_3843.jpeg"><div class="name">IMG_3843 (Chargers?)</div></div>
        <div class="card"><img src="./assets/images/referential/IMG_3844.jpeg"><div class="name">IMG_3844 (iPad?)</div></div>
        <div class="card"><img src="./assets/images/referential/IMG_3845.jpeg"><div class="name">IMG_3845 (Watch?)</div></div>
        <div class="card"><img src="./assets/images/referential/IMG_3846.jpeg"><div class="name">IMG_3846 (AirPods?)</div></div>
        <div class="card"><img src="./assets/images/referential/IMG_3847.jpeg"><div class="name">IMG_3847 (Cases?)</div></div>
        <div class="card"><img src="./assets/images/referential/IMG_3855.png"><div class="name">IMG_3855 (Samsung?)</div></div>
        <div class="card"><img src="./assets/images/referential/IMG_3908.jpeg"><div class="name">IMG_3908 (Switch?)</div></div>
    </div>
    <h1>Tienda Assets</h1>
    <div class="grid" id="tienda">
        <div class="card"><img src="./assets/images/Tienda/iphone-17-pro-max-black.jpeg"><div class="name">iphone-17-pro-max-black</div></div>
        <div class="card"><img src="./assets/images/Tienda/iphone-16-pro-max-desert.jpeg"><div class="name">iphone-16-pro-max-desert</div></div>
    </div>
</body>
</html>
